services:
  inference:
    build: .
    image: quant.cpp:latest
    volumes:
      - ./models:/models
    environment:
      # KV cache compression settings (passed as CLI args below)
      - TQ_KV_TYPE=uniform_4b
      - TQ_VALUE_QUANT=q4
      - TQ_THREADS=4
    ports:
      - "8080:8080"
    # Default: run model with KV compression
    # Override command to change model path, prompt, or options
    command:
      - /models/model.gguf
      - -k
      - uniform_4b
      - -v
      - q4
      - -j
      - "4"
      - -p
      - "Hello, world"

name: Deploy WASM Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'wasm/**'
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare pages directory
        run: |
          mkdir -p _site _site/guide
          # WASM demo (root)
          cp wasm/index.html _site/
          cp wasm/quant.js _site/ 2>/dev/null || true
          cp wasm/quant.wasm _site/ 2>/dev/null || true
          cp wasm/_headers _site/_headers 2>/dev/null || true
          # Educational guide (/guide)
          cp site/index.html _site/guide/ 2>/dev/null || true
          cp site/og-image.png _site/guide/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
